<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecretPay — Ledger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 32px; min-height: 100vh; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
    #status { padding: 8px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; letter-spacing: 1px; margin-bottom: 24px; background: #1a1a2e; color: #ffd700; }
    button { background: #6c5ce7; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 24px; }
    button:hover { background: #5a4bd1; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #details { min-height: 60px; margin-bottom: 16px; }
    .detail-row { display: flex; justify-content: space-between; padding: 12px 20px; background: #111; border: 1px solid #222; border-radius: 6px; margin: 4px 0; min-width: 400px; }
    .detail-row span { color: #888; }
    .detail-row strong { color: #ffd700; }
    #log { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; width: 100%; max-width: 600px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.8; }
    #log div { border-bottom: 1px solid #1a1a1a; padding: 1px 0; }
  </style>
</head>
<body>
  <h1>SecretPay — Ledger Bridge</h1>
  <p class="sub">Hardware approval for AI agent payments</p>
  <div id="status">DISCONNECTED</div>
  <div id="operator" style="color:#888;font-family:monospace;font-size:12px;margin-bottom:24px"></div>
  <button id="btn-connect">Connect Ledger</button>
  <div id="details"></div>
  <div id="log"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
